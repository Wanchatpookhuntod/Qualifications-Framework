{% extends "base.html" %}

{% block title %}เลือกบทบาท - TQF System{% endblock %}

{% block content %}
<div class="glass glass-form">
    <h2 class="mb-2">เลือกบทบาทที่ต้องการใช้งาน</h2>
    <p class="text-muted mb-6">บัญชีนี้มีหลายบทบาท กรุณาเลือกเพื่อเข้าสู่ระบบในบทบาทนั้น</p>

    <form method="POST" class="inline-actions">
        <select name="role" class="form-control flex-1 min-160" required>
            <option value="">-- เลือกบทบาท --</option>
            {% for r in roles %}
            <option value="{{ r }}">{{ r|upper }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary min-160">เข้าสู่ระบบ</button>
    </form>

    <div class="mt-6 text-muted text-sm">
        หมายเหตุ: คุณสามารถสลับบทบาทได้จากแถบด้านบนหลังจากเลือกแล้ว
    </div>
</div>
{% endblock %}
