{% extends "base.html" %}

{% block title %}เข้าสู่ระบบ - TQF System{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card glass">
        <div class="login-header">
            <h1>TQF System</h1>
            <p class="text-muted">ระบบบันทึก มคอ.3 และ มคอ.5</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="กรอกชื่อผู้ใช้"
                    required autofocus>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">เข้าสู่ระบบ</button>
        </form>

        <div class="mt-6 text-xxs text-muted text-center">
            <!-- <p>Designed and Developed by Wanchat Pookhuntod. <br> © 2026 All Rights Reserved.</p> -->
            <p>
                <strong>Wanchat Pookhuntod</strong> | 
                &copy; 2026 All Rights Reserved. 
                <span style="opacity: 0.8;">Powered by <strong>Flask</strong></span>
            </p>
        </div>
    </div>
</div>
{% endblock %}
