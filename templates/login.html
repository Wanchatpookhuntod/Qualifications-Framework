{% extends "base.html" %}

{% block title %}เข้าสู่ระบบ - TQF System{% endblock %}

{% block content %}
<div class="login-wrapper" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="login-card glass">
        <div class="login-header">
            <h1>TQF System</h1>
            <p style="color: var(--text-muted);">ระบบบันทึก มคอ.3 และ มคอ.5</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="กรอกชื่อผู้ใช้"
                    required autofocus>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">เข้าสู่ระบบ</button>
        </form>

        <div style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-muted); text-align: center;">
            <p>Admin: admin / password</p>
            <p>Academic: academic / password</p>
        </div>
    </div>
</div>
{% endblock %}
